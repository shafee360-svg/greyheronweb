<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Characters | Folktales of the Maldives</title>
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="stylesheet" href="home-redesign.css?v=2">
    <script src="components.js?v=3"></script>
    <script src="airtable.js?v=3"></script>
    <script src="gh-extras.js?v=1"></script>
</head>
<body class="home-redesign" data-palette="ocean" data-motifs="subtle" data-screen-label="Characters">

    <div id="site-header"></div>

    <main>

        <!-- Hero — Island Manuscript treatment -->
        <section class="hr-page-hero" data-comment-anchor="chars-hero">
            <div class="hr-hero__atmosphere"></div>
            <svg class="hr-corner hr-corner--bl" aria-hidden="true"><use href="#m-palm"/></svg>
            <svg class="hr-corner hr-corner--br" aria-hidden="true"><use href="#m-palm"/></svg>
            <svg class="hr-watermark" aria-hidden="true"><use href="#m-heron"/></svg>

            <div class="hr-page-hero__inner">
                <div class="hr-rule">
                    <span class="hr-rule__line"></span>
                    <svg class="hr-rule__glyph" aria-hidden="true"><use href="#m-glyph"/></svg>
                    <span class="hr-rule__line"></span>
                </div>
                <span class="hr-eyebrow">Grey Heron Books</span>
                <h1 class="hr-title">
                    Character <em>Explorer</em>
                </h1>
                <p class="hr-sub">Meet the heroes, spirits, and legends of the Maldives.</p>
            </div>

            <svg class="hr-wave" preserveAspectRatio="none" viewBox="0 0 1200 80" aria-hidden="true">
                <use href="#m-wave"/>
            </svg>
        </section>

        <!-- Search + filter controls -->
        <div class="chars-controls">
            <input
                type="search"
                id="chars-search"
                class="chars-search"
                placeholder="Search characters…"
                autocomplete="off"
            >
            <div class="chars-filters" id="chars-filters">
                <!-- Type filter buttons injected here by JS -->
            </div>
        </div>

        <p class="count-badge" id="count-badge"></p>

        <!-- Cards grid -->
        <div class="chars-grid" id="chars-grid">
            <div class="spinner-wrap">
                <div class="spinner"></div>
                <p>Gathering the characters…</p>
            </div>
        </div>

    </main>

    <!-- Character detail modal -->
    <div class="char-modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-label="Character details">
        <div class="char-modal char-modal-wrapper" id="modal-inner">
            <button class="char-modal__close" id="modal-close" aria-label="Close">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <div id="site-footer"></div>

    <script>
    // ── State ──────────────────────────────────────────────────
    let allChars     = [];
    let activeType   = 'All';
    let searchQuery  = '';

    const grid       = document.getElementById('chars-grid');
    const countBadge = document.getElementById('count-badge');
    const searchBox  = document.getElementById('chars-search');
    const filtersEl  = document.getElementById('chars-filters');
    const backdrop   = document.getElementById('modal-backdrop');
    const modalClose = document.getElementById('modal-close');
    const modalContent = document.getElementById('modal-content');

    // ── Modal helpers ──────────────────────────────────────────
    function openModal(char) {
        const f = char.fields;
        const imgUrl = getAttachmentUrl(f['Image']);
        const name   = f['Name'] || 'Unknown';
        const type   = char._type;
        const desc   = char._desc;
        const books  = char._books;
        const traits = char._traits;

        modalContent.innerHTML = `
            ${imgUrl
                ? `<div class="char-modal__img-wrap"><img src="${imgUrl}" alt="${name}" class="char-modal__img" loading="lazy"></div>`
                : `<div class="char-modal__img-placeholder">🌊</div>`
            }
            <div class="char-modal__body">
                ${type ? `<span class="char-modal__type">${type}</span>` : ''}
                <h2 class="char-modal__name">${name}</h2>
                ${desc ? `
                    <div class="char-modal__divider"></div>
                    <span class="char-modal__label">About</span>
                    <p class="char-modal__value">${desc}</p>
                ` : ''}
                ${books ? `
                    <span class="char-modal__label">Appears In</span>
                    <p class="char-modal__value">${books}</p>
                ` : ''}
                ${traits ? `
                    <span class="char-modal__label">Traits</span>
                    <p class="char-modal__value">${traits}</p>
                ` : ''}
            </div>
        `;
        backdrop.classList.add('is-open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        backdrop.classList.remove('is-open');
        document.body.style.overflow = '';
    }

    backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
    modalClose.addEventListener('click', closeModal);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── Field helpers ──────────────────────────────────────────
    // Airtable linked-record fields return arrays of opaque record IDs
    // (e.g. ["recABC123"]). The actual human-readable values come through
    // in "lookup" fields whose names look like "Name (from FieldName)".
    // This helper strips any raw IDs so they never reach the screen.
    const REC_ID = /^rec[A-Za-z0-9]{8,}$/;

    function cleanArray(arr) {
        if (!arr) return [];
        const a = Array.isArray(arr) ? arr : [arr];
        return a.map(v => String(v).trim()).filter(v => v && !REC_ID.test(v));
    }

    function resolveLinked(field) {
        return cleanArray(field).join(', ');
    }

    // For a given record's fields, find the best human-readable value for a
    // concept (like "Character Type") by checking the direct field first,
    // then any "(from …)" lookup field that contains the same keyword.
    function getField(fields, primaryKey, ...fallbackPatterns) {
        // 1. Try the direct field — but only if it's not all IDs
        const direct = cleanArray(fields[primaryKey]);
        if (direct.length) return direct.join(', ');

        // 2. Try Airtable lookup fields: "X (from PrimaryKey)" or pattern matches
        for (const pattern of fallbackPatterns) {
            for (const key of Object.keys(fields)) {
                if (pattern.test(key)) {
                    const val = cleanArray(fields[key]);
                    if (val.length) return val.join(', ');
                }
            }
        }
        return '';
    }

    // ── Render ─────────────────────────────────────────────────
    function render() {
        const q = searchQuery.toLowerCase();
        const visible = allChars.filter(c => {
            const name = (c.fields['Name'] || '').toLowerCase();
            const matchesSearch = !q || name.includes(q);
            const matchesType   = activeType === 'All' || c._types.includes(activeType);
            return matchesSearch && matchesType;
        });

        grid.innerHTML = '';

        if (!visible.length) {
            grid.innerHTML = `<p class="chars-empty">No characters match your search.</p>`;
            countBadge.textContent = '';
            return;
        }

        countBadge.textContent = visible.length === allChars.length
            ? `${allChars.length} character${allChars.length !== 1 ? 's' : ''} in the collection`
            : `${visible.length} of ${allChars.length} characters`;

        visible.forEach((char, i) => {
            const f      = char.fields;
            const name   = f['Name'] || 'Unknown';
            const type   = char._type;
            const imgUrl = getAttachmentUrl(f['Image']);
            const books  = char._books;

            const card = document.createElement('div');
            card.className = 'char-card';
            card.id = 'char-' + char.id;
            card.style.animationDelay = `${i * 35}ms`;
            card.setAttribute('role', 'button');
            card.setAttribute('tabindex', '0');
            card.setAttribute('aria-label', `View ${name}`);

            card.innerHTML = `
                ${imgUrl
                    ? `<div class="char-card__img-wrap"><img src="${imgUrl}" alt="${name}" class="char-card__img" loading="lazy"></div>`
                    : `<div class="char-card__img-placeholder">🌊</div>`
                }
                <div class="char-card__body">
                    ${type ? `<p class="char-card__type">${type}</p>` : ''}
                    <h3 class="char-card__name">${name}</h3>
                    ${books ? `<p class="char-card__book">${books}</p>` : ''}
                </div>
            `;

            card.addEventListener('click', () => openModal(char));
            card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(char); });

            grid.appendChild(card);
        });
    }

    // ── Filter buttons ─────────────────────────────────────────
    function buildFilters(chars) {
        const types = ['All', ...new Set(
            chars.flatMap(c => c._types).filter(Boolean).sort()
        )];

        filtersEl.innerHTML = types.map(t => `
            <button class="filter-btn${t === 'All' ? ' active' : ''}" data-type="${t}">${t}</button>
        `).join('');

        filtersEl.addEventListener('click', e => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeType = btn.dataset.type;
            render();
        });
    }

    // ── Search ─────────────────────────────────────────────────
    searchBox.addEventListener('input', () => {
        searchQuery = searchBox.value;
        render();
    });

    // ── Load data ──────────────────────────────────────────────
    (async () => {
        try {
            const records = await fetchAllRecords(TABLES.characters);

            if (!records.length) {
                grid.innerHTML = `<p class="chars-empty">No characters found.</p>`;
                return;
            }

            // Drop any record that has no cover image
            const withImage = records.filter(r => getAttachmentUrl(r.fields['Image']));
            records.splice(0, records.length, ...withImage);

            // Pre-resolve all linked/lookup fields once so they're never
            // shown as raw Airtable record IDs anywhere on the page.
            records.forEach(r => {
                const f = r.fields;

                // Character Type — may be a linked field; the lookup
                // "Name (from Character Type)" carries the real text
                r._type = getField(f,
                    'Character Type',
                    /name.*from.*character.?type/i,
                    /character.?type.*name/i,
                    /type/i
                );
                // Split into individual types for filtering (e.g. "Bird, Animal" → ["Bird", "Animal"])
                r._types = r._type ? r._type.split(',').map(t => t.trim()).filter(Boolean) : [];

                // Books this character appears in
                r._books = getField(f,
                    'Appears in Book',
                    /name.*from.*appears/i,
                    /title.*from/i,
                    /appears/i,
                    /book/i
                );

                // Description / bio
                r._desc = f['Description'] || f['Bio'] || f['Notes'] || f['Summary'] || '';

                // Traits
                r._traits = getField(f,
                    'Character Traits',
                    /name.*from.*trait/i,
                    /trait/i
                );
            });

            // Shuffle randomly for the default "All" view
            for (let i = records.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [records[i], records[j]] = [records[j], records[i]];
            }

            allChars = records;
            countBadge.textContent = `${records.length} character${records.length !== 1 ? 's' : ''} in the collection`;
            buildFilters(records);
            render();

            // Deep-link: characters.html#char-recXXX (linked from themes page)
            const hash = window.location.hash;
            if (hash && hash.startsWith('#char-')) {
                const targetRecId = hash.slice(6); // strip '#char-'
                const target = allChars.find(c => c.id === targetRecId);
                if (target) {
                    // Small delay so the grid has painted before the modal opens
                    setTimeout(() => {
                        const card = document.getElementById('char-' + targetRecId);
                        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        openModal(target);
                    }, 200);
                }
            }

        } catch (err) {
            grid.innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:5rem 1rem;">
                    <p style="color:#c00;">⚠️ Could not load characters: ${err.message}</p>
                    <p style="font-size:0.85rem;color:var(--color-ink-muted);margin-top:0.5rem;">Check your Airtable token in airtable.js</p>
                </div>`;
        }
    })();
    </script>

</body>
</html>
