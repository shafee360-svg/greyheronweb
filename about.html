<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Folktales of the Maldives</title>
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="stylesheet" href="home-redesign.css?v=2">
    <script src="components.js?v=3"></script>
    <script src="airtable.js?v=3"></script>
    <script src="gh-extras.js?v=1"></script>
</head>
<body class="home-redesign" data-palette="manuscript" data-motifs="subtle" data-screen-label="About">

    <div id="site-header"></div>

    <main>

        <section class="hr-page-hero" data-comment-anchor="about-hero">
            <div class="hr-hero__atmosphere"></div>
            <svg class="hr-corner hr-corner--bl" aria-hidden="true"><use href="#m-palm"/></svg>
            <svg class="hr-corner hr-corner--br" aria-hidden="true"><use href="#m-palm"/></svg>
            <svg class="hr-watermark" aria-hidden="true"><use href="#m-heron"/></svg>

            <div class="hr-page-hero__inner">
                <div class="hr-rule">
                    <span class="hr-rule__line"></span>
                    <svg class="hr-rule__glyph" aria-hidden="true"><use href="#m-glyph"/></svg>
                    <span class="hr-rule__line"></span>
                </div>
                <span class="hr-eyebrow">Grey Heron Books</span>
                <h1 class="hr-title">
                    Maldivian Folklore,
                    <em>Kept Alive</em>
                </h1>
                <p class="hr-sub">The stories, the people, and the purpose behind the books.</p>
            </div>

            <svg class="hr-wave" preserveAspectRatio="none" viewBox="0 0 1200 80" aria-hidden="true">
                <use href="#m-wave"/>
            </svg>
        </section>

        <div class="about-content">

            <div id="about-sections">
                <div class="spinner-wrap">
                    <div class="spinner"></div>
                    <p>Loading…</p>
                </div>
            </div>

            <br>
            <a href="books.html" class="btn-primary">Browse the Collection</a>

        </div>

    <script>
    (async () => {
        const container = document.getElementById('about-sections');
        try {
            const records = await fetchAllRecords(TABLES.aboutPage, { skipView: true });

            const published = records
                .filter(r => r.fields['Publishing Status'] === 'publish')
                .sort((a, b) => {
                    const na = parseInt(a.fields['Section']?.replace(/\D/g, '')) || 0;
                    const nb = parseInt(b.fields['Section']?.replace(/\D/g, '')) || 0;
                    return na - nb;
                });

            if (!published.length) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = published.map((r, i) => {
                const header  = r.fields['Header'] || '';
                const content = r.fields['Content'] || '';
                const paras   = content.split(/\n+/).filter(Boolean).map(p => `<p>${p}</p>`).join('');
                const divider = i < published.length - 1 ? '<div class="ornament">✦</div>' : '';
                return `<h2>${header}</h2>${paras}${divider}`;
            }).join('');

        } catch (err) {
            container.innerHTML = `<p style="color:#c00;">Could not load content: ${err.message}</p>`;
        }
    })();
    </script>

    </main>

    <div id="site-footer"></div>

</body>
</html>
