<body class="home-redesign" data-palette="ocean" data-motifs="subtle" data-screen-label="Themes">

    <div id="site-header"></div>

    <main>
        <section class="hr-page-hero" data-comment-anchor="themes-hero">

                    <span class="hr-rule__line"></span>
                    <svg class="hr-rule__glyph" aria-hidden="true"><use href="#m-glyph"/></svg>
                    <span class="hr-rule__line"></span>
                </div>

                    Themes of <em>Maldivian Folklore</em>

        <div class="themes-dashboard gh-reveal">

        </div>
    </main>

    <div id="site-footer"></div>

    <!-- Character modal -->
    <div class="char-modal-backdrop" id="char-modal-backdrop" role="dialog" aria-modal="true" aria-label="Character details">
        <div class="char-modal char-modal-wrapper" id="char-modal-inner">
            <button class="char-modal__close" id="char-modal-close" aria-label="Close">✕</button>
            <div id="char-modal-content"></div>
        </div>
    </div>

    <!-- Book modal -->
    <div class="char-modal-backdrop" id="book-modal-backdrop" role="dialog" aria-modal="true" aria-label="Book details">
        <div class="char-modal char-modal-wrapper book-modal" id="book-modal-inner">
            <button class="char-modal__close" id="book-modal-close" aria-label="Close">✕</button>
            <div id="book-modal-content"></div>
        </div>
    </div>

    <script>
    let DETAIL_BODY = null;
    document.addEventListener('DOMContentLoaded', () => {
        DETAIL_BODY = document.getElementById('detail-body');

        // Delegated handler — fires the char modal for any character avatar button
        DETAIL_BODY.addEventListener('click', e => {
            const charBtn = e.target.closest('[data-char-id]');
            if (charBtn) { const c = charMap[charBtn.dataset.charId]; if (c) openCharModal(c); return; }

            const bookBtn = e.target.closest('[data-book-id]');
            if (bookBtn) { openBookModal(bookBtn.dataset.bookId); }
        });
    });

    const bookMap = {};
    const charMap = {};

    // Simple constellation SVGs mapped by theme key (quick approach)
    const CONSTELLATIONS = {
        'Sea': `
            <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                <g fill="none" stroke="var(--color-teal)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path class="const-line" d="M20 60 L60 20 L110 40 L160 10"/>
                    <circle cx="20" cy="60" r="2.6" fill="var(--color-teal)"/>
                    <circle cx="60" cy="20" r="3" fill="var(--color-teal)"/>
                    <circle cx="110" cy="40" r="2.6" fill="var(--color-teal)"/>
                    <circle cx="160" cy="10" r="2.6" fill="var(--color-teal)"/>
                </g>
            </svg>`,
        'Nature': `
            <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                <g fill="none" stroke="var(--color-coral)" stroke-width="1.4">
                    <path class="const-line" d="M30 30 L70 50 L100 20 L140 45 L180 30"/>
                    <circle cx="30" cy="30" r="2.4" fill="var(--color-coral)"/>
                    <circle cx="70" cy="50" r="2.8" fill="var(--color-coral)"/>
                    <circle cx="100" cy="20" r="2.4" fill="var(--color-coral)"/>
                    <circle cx="140" cy="45" r="2.4" fill="var(--color-coral)"/>
                    <circle cx="180" cy="30" r="2.4" fill="var(--color-coral)"/>
                </g>
            </svg>`,
        'Supernatural': `
            <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                <g fill="none" stroke="var(--color-ink-muted)" stroke-width="1.2">
                    <path class="const-line" d="M15 70 L55 40 L95 60 L135 25 L175 55"/>
                    <circle cx="15" cy="70" r="2.2" fill="var(--color-ink-muted)"/>
                    <circle cx="55" cy="40" r="2.6" fill="var(--color-ink-muted)"/>
                    <circle cx="95" cy="60" r="2.2" fill="var(--color-ink-muted)"/>
                    <circle cx="135" cy="25" r="2.2" fill="var(--color-ink-muted)"/>
                    <circle cx="175" cy="55" r="2.2" fill="var(--color-ink-muted)"/>
                </g>
            </svg>`,
        'Animals': `
            <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                <g fill="none" stroke="var(--color-ocean)" stroke-width="1.4">
                    <path class="const-line" d="M20 80 L50 50 L90 70 L130 40 L170 60"/>
                    <circle cx="20" cy="80" r="2.4" fill="var(--color-ocean)"/>
                    <circle cx="50" cy="50" r="2.6" fill="var(--color-ocean)"/>
                    <circle cx="90" cy="70" r="2.4" fill="var(--color-ocean)"/>
                    <circle cx="130" cy="40" r="2.4" fill="var(--color-ocean)"/>
                    <circle cx="170" cy="60" r="2.4" fill="var(--color-ocean)"/>
                </g>
            </svg>`,
        'People': `
            <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                <g fill="none" stroke="var(--color-teal)" stroke-width="1.3">
                    <path class="const-line" d="M40 20 L60 45 L90 30 L120 55 L150 35"/>
                    <circle cx="40" cy="20" r="2.6" fill="var(--color-teal)"/>
                    <circle cx="60" cy="45" r="2.6" fill="var(--color-teal)"/>
                    <circle cx="90" cy="30" r="2.6" fill="var(--color-teal)"/>
                    <circle cx="120" cy="55" r="2.6" fill="var(--color-teal)"/>
                    <circle cx="150" cy="35" r="2.6" fill="var(--color-teal)"/>
                </g>
            </svg>`,
        'Journey': `
            <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                <g fill="none" stroke="var(--color-coral)" stroke-width="1.2">
                    <path class="const-line" d="M10 60 L50 40 L90 50 L130 30 L170 45"/>
                    <circle cx="10" cy="60" r="2.2" fill="var(--color-coral)"/>
                    <circle cx="50" cy="40" r="2.6" fill="var(--color-coral)"/>
                    <circle cx="90" cy="50" r="2.2" fill="var(--color-coral)"/>
                    <circle cx="130" cy="30" r="2.2" fill="var(--color-coral)"/>
                    <circle cx="170" cy="45" r="2.2" fill="var(--color-coral)"/>
                </g>
            </svg>`,
        'Islands': `
            <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                <g fill="none" stroke="var(--color-teal)" stroke-width="1.2">
                    <path class="const-line" d="M25 70 L55 50 L90 65 L125 45 L160 68"/>
                    <circle cx="25" cy="70" r="2.2" fill="var(--color-teal)"/>
                    <circle cx="55" cy="50" r="2.6" fill="var(--color-teal)"/>
                    <circle cx="90" cy="65" r="2.2" fill="var(--color-teal)"/>
                    <circle cx="125" cy="45" r="2.2" fill="var(--color-teal)"/>
                    <circle cx="160" cy="68" r="2.2" fill="var(--color-teal)"/>
                </g>
            </svg>`,
        'Night': `
            <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                <g fill="none" stroke="var(--color-ink-muted)" stroke-width="1.2">
                    <path class="const-line" d="M20 30 L60 50 L100 28 L140 55 L180 35"/>
                    <circle cx="20" cy="30" r="2.2" fill="var(--color-ink-muted)"/>
                    <circle cx="60" cy="50" r="2.6" fill="var(--color-ink-muted)"/>
                    <circle cx="100" cy="28" r="2.2" fill="var(--color-ink-muted)"/>
                    <circle cx="140" cy="55" r="2.2" fill="var(--color-ink-muted)"/>
                    <circle cx="180" cy="35" r="2.2" fill="var(--color-ink-muted)"/>
                </g>
            </svg>`,
        'Magic': `
            <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                <g fill="none" stroke="var(--color-coral)" stroke-width="1.6">
                    <path class="const-line" d="M25 50 L60 20 L95 55 L130 25 L165 50"/>
                    <circle cx="25" cy="50" r="2.8" fill="var(--color-coral)"/>
                    <circle cx="60" cy="20" r="3" fill="var(--color-coral)"/>
                    <circle cx="95" cy="55" r="2.8" fill="var(--color-coral)"/>
                    <circle cx="130" cy="25" r="2.8" fill="var(--color-coral)"/>
                    <circle cx="165" cy="50" r="2.8" fill="var(--color-coral)"/>
                </g>
            </svg>`
    };

    // Small deterministic PRNG (mulberry32) to generate repeatable constellations per theme
    function mulberry32(a) {
        return function() {
            a |= 0; a = a + 0x6D2B79F5 | 0;
            var t = Math.imul(a ^ a >>> 15, 1 | a);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    // Color overrides per keyword for stronger, distinct accents
    const THEME_COLOR_MAP = {
        'Sea':    'hsl(178deg 62% 35%)',
        'Nature': 'hsl(14deg 62% 42%)',
        'Supernatural': 'hsl(250deg 18% 42%)',
        'Animals':'hsl(200deg 45% 38%)',
        'People': 'hsl(170deg 28% 36%)',
        'Journey':'hsl(10deg 56% 40%)',
        'Islands':'hsl(190deg 36% 38%)',
        'Night':  'hsl(230deg 18% 36%)',
        'Magic':  'hsl(8deg 62% 44%)'
    };

    function proceduralConstellation(theme) {
        const seed = Array.from(theme).reduce((s,c)=>s + c.charCodeAt(0), 0) || Date.now();
        const rnd = mulberry32(seed);
        const w = 200, h = 100;

        // decide visual variety
        const pointCount = 3 + Math.floor(rnd() * 6); // 3..8
        const strokeWidth = +(1 + rnd() * 2.2).toFixed(2);
        const shapeTypes = ['linear','loop','curved','islands'];
        const shape = shapeTypes[Math.floor(rnd() * shapeTypes.length)];

        // pick a color from overrides if keyword matches, otherwise use a hue from the seed
        const keywords = Object.keys(THEME_COLOR_MAP);
        const matched = keywords.find(k => theme.toLowerCase().includes(k.toLowerCase()));
        const baseColor = matched ? THEME_COLOR_MAP[matched] : `hsl(${Math.floor(seed % 360)}deg 60% 45%)`;

        // island colours (sandy / earth tones) for island-like themes
        const islandAccent = 'hsl(37deg 55% 60%)';
        const useIslandFill = (matched && matched.toLowerCase() === 'islands') || (shape === 'islands');
        const circleFill = useIslandFill ? islandAccent : baseColor;

        const points = Array.from({length: pointCount}, () => ({ x: +(8 + rnd() * (w-16)).toFixed(1), y: +(8 + rnd() * (h-16)).toFixed(1) }));

        // helper to compute a curved control point between two points
        function controlBetween(a,b,scale) {
            const mx = (a.x + b.x)/2;
            const my = (a.y + b.y)/2;
            const dx = b.y - a.y;
            const dy = -(b.x - a.x);
            const len = Math.sqrt(dx*dx + dy*dy) || 1;
            const nx = dx / len;
            const ny = dy / len;
            return { x: +(mx + nx * scale).toFixed(1), y: +(my + ny * scale).toFixed(1) };
        }

        let pathD = '';

        if (shape === 'linear') {
            pathD = 'M ' + points.map(p => `${p.x} ${p.y}`).join(' L ');
        } else if (shape === 'loop') {
            pathD = 'M ' + points.map(p => `${p.x} ${p.y}`).join(' L ') + ' Z';
        } else if (shape === 'curved') {
            // create smooth quadratic segments
            pathD = '';
            for (let i=0;i<points.length-1;i++) {
                const a = points[i];
                const b = points[i+1];
                const scale = 6 + rnd()*22;
                const c = controlBetween(a,b,scale);
                if (i===0) pathD += `M ${a.x} ${a.y} Q ${c.x} ${c.y} ${b.x} ${b.y}`;
                else pathD += ` Q ${c.x} ${c.y} ${b.x} ${b.y}`;
            }
        } else { // islands / branches
            // islands: short curved connectors and island fills
            const segs = [];
            for (let i=0;i<points.length-1;i++) {
                const a = points[i];
                const b = points[i+1];
                const scale = 4 + rnd()*14;
                const c = controlBetween(a,b,scale);
                segs.push(`${i===0?('M '+a.x+' '+a.y):('') } Q ${c.x} ${c.y} ${b.x} ${b.y}`);
            }
            pathD = segs.join(' ');
        }

        const circles = points.map(p => {
            const r = +(2 + rnd()*3.2).toFixed(2);
            // for islands, use filled 'island' look with thin darker stroke
            if (useIslandFill) {
                return `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${circleFill}" stroke="rgba(0,0,0,0.08)" stroke-width="0.6" />`;
            }
            return `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${circleFill}" />`;
        }).join('');

        const titleId = 'const-title-' + Math.abs(seed);
        return `
            <svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="${titleId}">
                <title id="${titleId}">Constellation for ${theme}</title>
                <g fill="none" stroke="${baseColor}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round">
                    <path class="const-line" d="${pathD}" />
                    ${circles}
                </g>
            </svg>`;
    }

    function getConstellationForTheme(theme) {
        if (!theme) return '';
        if (CONSTELLATIONS[theme]) return CONSTELLATIONS[theme];
        const keywords = Object.keys(CONSTELLATIONS);
        const found = keywords.find(k => theme.toLowerCase().includes(k.toLowerCase()));
        if (found) return CONSTELLATIONS[found];
        // fallback: generate a small procedural constellation so every theme has something unique
        return proceduralConstellation(theme);
    }

    // Strip raw Airtable record IDs — they look like recXXXXXXXXXX
    const REC_ID = /^rec[A-Za-z0-9]{8,}$/;
    function cleanIds(arr) {
        if (!arr) return [];
        return (Array.isArray(arr) ? arr : [arr]).filter(v => v && REC_ID.test(String(v).trim()));
    }
    function cleanNames(arr) {
        if (!arr) return [];
        return (Array.isArray(arr) ? arr : [arr])
            .map(v => String(v).trim())
            .filter(v => v && !REC_ID.test(v));
    }

    // ── Character modal ────────────────────────────────────────
    const charBackdrop   = document.getElementById('char-modal-backdrop');
    const charModalClose = document.getElementById('char-modal-close');
    const charModalContent = document.getElementById('char-modal-content');

    function openCharModal(c) {
        const imgHTML = c.imgUrl
            ? `<img src="${c.imgUrl}" alt="${c.name}" class="char-modal__img" loading="lazy">`
            : `<div class="char-modal__img-placeholder">🌊</div>`;

        charModalContent.innerHTML = `
            ${imgHTML}
            <div class="char-modal__body">
                ${c.type  ? `<span class="char-modal__type">${c.type}</span>` : ''}
                <h2 class="char-modal__name">${c.name}</h2>
                ${c.desc  ? `<div class="char-modal__divider"></div>
                             <span class="char-modal__label">About</span>
                             <p class="char-modal__value">${c.desc}</p>` : ''}
                ${c.books ? `<span class="char-modal__label">Appears In</span>
                             <p class="char-modal__value">${c.books}</p>` : ''}
                ${c.traits? `<span class="char-modal__label">Traits</span>
                             <p class="char-modal__value">${c.traits}</p>` : ''}
            </div>
        `;
        charBackdrop.classList.add('is-open');
        document.body.style.overflow = 'hidden';
    }

    function closeCharModal() {
        charBackdrop.classList.remove('is-open');
        document.body.style.overflow = '';
    }

    charBackdrop.addEventListener('click', e => { if (e.target === charBackdrop) closeCharModal(); });
    charModalClose.addEventListener('click', closeCharModal);

    function showDetail(theme, cat, fields) {
        const el = DETAIL_BODY || document.getElementById('detail-body');
        if (!el) return;

        const desc = fields['Explanation'] || '';

        const storyIds = cleanIds(fields['Themes in Books'] || fields['Related Stories'] || []);
        const charIds  = cleanIds(fields['Related Characters'] || []);

        const storyHTML = storyIds.length
            ? storyIds.map(id => {
                const b = bookMap[id];
                if (b) return `<button type="button" class="detail-story-tag detail-link" data-book-id="${b.id}">${b.title}</button>`;
                return '';
              }).filter(Boolean).join('') || `<span class="detail-none">—</span>`
            : `<span class="detail-none">—</span>`;

        const charHTML = charIds.length
            ? charIds.map(id => {
                const c = charMap[id];
                if (!c) return '';
                const initials = c.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
                return `<button type="button" class="detail-char-avatar detail-link" data-char-id="${id}">
                    ${c.imgUrl
                        ? `<img src="${c.imgUrl}" alt="${c.name}">`
                        : `<div class="detail-char-avatar__initials">${initials}</div>`
                    }
                    <span>${c.name}</span>
                </button>`;
              }).filter(Boolean).join('') || `<span class="detail-none">—</span>`
            : `<span class="detail-none">—</span>`;

        const relatedSection = (storyIds.length || charIds.length) ? `
            <div class="detail-divider"></div>
            <span class="detail-section-label">Related Stories</span>
            <div class="detail-tags">${storyHTML}</div>
            <span class="detail-section-label">Related Characters</span>
            <div class="detail-char-avatars">${charHTML}</div>
        ` : '';

        const constellationSVG = getConstellationForTheme(theme);
        el.innerHTML = `
            ${constellationSVG ? `<div class="theme-constellation" role="img" aria-label="Constellation for ${theme}">${constellationSVG}</div>` : ''}
            <span class="detail-cat-label">${cat}</span>
            <h2 class="detail-title">${theme}</h2>
            <div class="detail-divider"></div>
            <p class="detail-desc">${desc || 'No explanation available yet.'}</p>
            ${relatedSection}
        `;

        (function animateConstellation(containerEl){
            const wrap = containerEl.querySelector('.theme-constellation');
            if (!wrap) return;
            const svg = wrap.querySelector('svg');
            if (!svg) return;
            svg.querySelectorAll('circle').forEach((s, i) => {
                const dur = 1.6 + Math.random() * 1.4;
                s.style.animation = `twinkle ${dur}s infinite`;
                s.style.animationDelay = `${Math.random() * 0.8}s`;
            });
            const path = svg.querySelector('.const-line');
            if (path) {
                path.style.animation = 'none';
                void path.getBoundingClientRect();
                path.style.animation = '';
                path.classList.remove('replay');
                void path.offsetWidth;
                path.classList.add('replay');
            }
        })(el);
    }

    (async () => {
        const themesLeft = document.getElementById('themes-left');
        const statsStrip = document.getElementById('themes-stats');

        try {
            const [bookRecords, charRecords, themeRecords] = await Promise.all([
                fetchAllRecords(TABLES.books, { skipView: true }),
                fetchAllRecords(TABLES.characters),
                fetchAllRecords(TABLES.themes, {
                    sort: [{ field: 'Theme Category', direction: 'asc' }]
                })
            ]);

            bookRecords.forEach(r => {
                const f = r.fields;
                const REC_PAT = /^rec[A-Za-z0-9]{8,}$/;
                function resolve(field) {
                    if (!field) return '';
                    const arr = Array.isArray(field) ? field : [field];
                    return arr.map(v => String(v).trim()).filter(v => v && !REC_PAT.test(v)).join(', ');
                }
                function scan(pattern) {
                    for (const k of Object.keys(f)) {
                        if (pattern.test(k)) { const v = resolve(f[k]); if (v) return v; }
                    }
                    return '';
                }
                const authors = scan(/author/i);
                const illustrators = scan(/illustrat/i);
                const coverField = f['Cover Photo'];
                bookMap[r.id] = {
                    id:        r.id,
                    title:     (Array.isArray(f['Title'])
                                    ? f['Title'].map(v => String(v).trim()).find(v => v && !REC_PAT.test(v))
                                    : f['Title'])
                               || 'Untitled',
                    coverUrl:  coverField && Array.isArray(coverField) && coverField.length ? coverField[0].url : null,
                    language:  f['Language'] || '',
                    bookType:  f['Book Type'] || '',
                    price:     f['Retail Price'] || null,
                    published: f['Published'] || '',
                    author:    authors === illustrators ? authors : [authors, illustrators].filter(Boolean).join(' / '),
                };
            });

            charRecords.forEach(r => {
                const f = r.fields;
                const imgField = f['Image'];
                const imgUrl = imgField && Array.isArray(imgField) && imgField.length ? imgField[0].url : null;

                function getCharField(...keys) {
                    for (const k of keys) {
                        const v = cleanNames(Array.isArray(f[k]) ? f[k] : f[k] ? [f[k]] : []);
                        if (v.length) return v.join(', ');
                    }
                    const pattern = new RegExp(keys[0].replace(/\s/g,'.*'), 'i');
                    for (const key of Object.keys(f)) {
                        if (pattern.test(key)) {
                            const v = cleanNames(Array.isArray(f[key]) ? f[key] : f[key] ? [f[key]] : []);
                            if (v.length) return v.join(', ');
                        }
                    }
                    return '';
                }

                charMap[r.id] = {
                    name:   f['Name'] || 'Unknown',
                    imgUrl,
                    type:   getCharField('Character Type', 'Type'),
                    desc:   f['Description'] || f['Bio'] || f['Notes'] || f['Summary'] || '',
                    books:  getCharField('Appears in Book', 'Book', 'Title'),
                    traits: getCharField('Character Traits', 'Traits'),
                };
            });

            if (!themeRecords.length) {
                themesLeft.innerHTML = '<p style="font-style:italic;color:var(--color-ink-muted);">No themes found.</p>';
                return;
            }

            const byCategory  = {};
            themeRecords.forEach(r => {
                const cat = r.fields['Theme Category'] || 'Other';
                if (!byCategory[cat]) byCategory[cat] = [];
                byCategory[cat].push(r.fields);
            });

            const categories  = Object.keys(byCategory);
            const totalThemes = themeRecords.length;

            statsStrip.innerHTML = `
                <span class="stat-pill"><strong>${totalThemes}</strong> themes</span>
                <span class="stat-pill"><strong>${categories.length}</strong> categories</span>
                <span class="stat-pill" style="font-style:italic;font-weight:400;color:var(--color-ink-muted);">Select any theme to explore it →</span>
            `;

            themesLeft.innerHTML = '';

            categories.forEach((cat, ci) => {
                const block = document.createElement('div');
                block.className = 'category-block';
                block.style.animationDelay = `${ci * 80}ms`;

                const heading = document.createElement('div');
                heading.className = 'category-heading';
                heading.innerHTML = `
                    <div class="category-heading-line left"></div>
                    <span>${cat}</span>
                    <div class="category-heading-line"></div>
                `;

                const tagsRow = document.createElement('div');
                tagsRow.className = 'theme-tags';

                byCategory[cat].forEach(f => {
                    const theme = f['Themes'] || 'Unnamed';
                    const tag   = document.createElement('button');
                    tag.type      = 'button';
                    tag.className = 'theme-tag';
                    tag.textContent = theme;

                    tag.onclick = () => {
                        document.querySelectorAll('.theme-tag').forEach(t => t.classList.remove('active'));
                        tag.classList.add('active');
                        showDetail(theme, cat, f);
                        const panel = document.getElementById('detail-panel');
                        panel.scrollTop = 0;
                        panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    };

                    tagsRow.appendChild(tag);
                });

                block.appendChild(heading);
                block.appendChild(tagsRow);
                themesLeft.appendChild(block);
            });

            const tags = Array.from(themesLeft.querySelectorAll('.theme-tag'));
            if (tags.length) {
                const randomTag = tags[Math.floor(Math.random() * tags.length)];
                randomTag.click();
            }

        } catch (err) {
            themesLeft.innerHTML = `
                <div style="text-align:center;padding:4rem 1rem;">
                    <p style="color:#c00;">⚠️ Could not load themes: ${err.message}</p>
                    <p style="font-size:0.85rem;color:var(--color-ink-muted);margin-top:0.5rem;">Check your Airtable token in airtable.js</p>
                </div>`;
        }
    })();
    </script>

    <script>
    // ── Book modal ─────────────────────────────────────────────
    const bookBackdrop    = document.getElementById('book-modal-backdrop');
    const bookModalClose  = document.getElementById('book-modal-close');
    const bookModalContent = document.getElementById('book-modal-content');

    let _activeBookId = null;

    function openBookModal(bookId) {
        const b = bookMap[bookId];
        if (!b) return;
        _activeBookId = bookId;

        const inCart = Cart.has(bookId);
        const badge  = [b.bookType, b.language].filter(Boolean).join(' · ').toUpperCase();

        bookModalContent.innerHTML = `
            <div class="book-modal-inner">
                <div class="book-modal-cover">
                    ${b.coverUrl
                        ? `<img src="${b.coverUrl}" alt="${b.title}">`
                        : `<div class="book-modal-cover-placeholder">📖</div>`
                    }
                </div>
                <div class="book-modal-body">
                    ${badge ? `<span class="book-modal-badge">${badge}</span>` : ''}
                    <h2 class="book-modal-title">${b.title}</h2>
                    <div class="book-modal-meta">
                        ${b.author ? `<div class="book-modal-meta-item">
                            <small>Author &amp; Illustrator</small>
                            <p>${b.author}</p>
                        </div>` : ''}
                        ${b.published ? `<div class="book-modal-meta-item">
                            <small>Published</small>
                            <p>${b.published}</p>
                        </div>` : ''}
                        <div class="book-modal-meta-item book-modal-price">
                            <small>Retail Price</small>
                            <p>${b.price ? `MVR ${b.price}` : 'Coming Soon'}</p>
                        </div>
                    </div>
                    <div class="book-modal-actions">
                        ${b.price ? `<button class="btn-cart-modal${inCart ? ' in-cart' : ''}" id="bm-cart-btn" data-id="${bookId}">
                            🛒 ${inCart ? '✓ In Cart' : 'Add to Cart'}
                        </button>` : ''}
                        <a href="book-details.html?id=${encodeURIComponent(bookId)}" class="btn-details-modal">
                            Full Details →
                        </a>
                    </div>
                </div>
            </div>
        `;

        // Wire cart button
        const cartBtn = bookModalContent.querySelector('#bm-cart-btn');
        if (cartBtn) {
            cartBtn.addEventListener('click', () => {
                const id = cartBtn.dataset.id;
                if (Cart.has(id)) {
                    Cart.remove(id);
                    cartBtn.classList.remove('in-cart');
                    cartBtn.innerHTML = '🛒 Add to Cart';
                } else {
                    Cart.add({ id, title: b.title, language: b.language, price: b.price ? parseFloat(b.price) : null, coverUrl: b.coverUrl || null });
                    cartBtn.classList.add('in-cart');
                    cartBtn.innerHTML = '🛒 ✓ In Cart';
                }
            });
        }

        bookBackdrop.classList.add('is-open');
        document.body.style.overflow = 'hidden';
    }

    function closeBookModal() {
        bookBackdrop.classList.remove('is-open');
        document.body.style.overflow = '';
        _activeBookId = null;
    }

    bookBackdrop.addEventListener('click', e => { if (e.target === bookBackdrop) closeBookModal(); });
    bookModalClose.addEventListener('click', closeBookModal);
    // Escape closes whichever modal is open (book takes priority over char since it's newer)
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            if (bookBackdrop.classList.contains('is-open')) closeBookModal();
            else closeCharModal();
        }
    });
    </script>
